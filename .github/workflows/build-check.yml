name: Build Check

# Run a build verification after a pull request is approved.
on:
  pull_request:
    types: [opened]
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  build:
    name: Build with ${{ matrix.pgdir }}
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push' || github.event_name == 'pull_request'
    # Temporary debug condition (disabled):
    # if: true
    runs-on: self-hosted
    timeout-minutes: 20

    strategy:
      # List of PostgreSQL binary directory names under the configured root.
      # To add more PostgreSQL versions, append entries here, e.g.:
      #   - psql170
      #   - psql160
      matrix:
        pgdir:
          - postgresql-16.13  
          - postgresql-17.9
          - postgresql-18.3
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and install pg_strom
        env:
          PSQLBIN_ROOT: ${{ env.PSQLBIN_ROOT }}
        run: |
          PSQLBIN_ROOT=${PSQLBIN_ROOT:-/actions-runner/psqlbin}
          cd src
          make clean
          PG_CONFIG=${PSQLBIN_ROOT}/${{ matrix.pgdir }}/bin/pg_config make -j$(nproc) install

      - name: Notify owner on failure
        if: failure() && (github.event_name == 'pull_request' || github.event_name == 'push') && env.ACT != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const eventName = context.eventName;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            if (eventName === 'pull_request') {
              const prAuthor = context.payload.pull_request.user.login;
              const prNumber = context.payload.pull_request.number;
              const body = [
                `@${prAuthor} the build check failed for \`${{ matrix.pgdir }}\` on PR #${prNumber}.`,
                '',
                `Run: ${runUrl}`,
              ].join('\n');

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
              return;
            }

            if (eventName === 'push') {
              const pusher = context.actor;
              const body = [
                `@${pusher} the build check failed for \`${{ matrix.pgdir }}\` on push to \`${context.ref}\`.`,
                '',
                `Run: ${runUrl}`,
              ].join('\n');

              await github.rest.repos.createCommitComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                commit_sha: context.sha,
                body,
              });
            }
