name: Build Check

# Run a build verification when a pull request is submitted.
on:
  pull_request:
    types: [opened, synchronize, reopened]
  # Temporary setting for debugging:
  # pull_request_review:
  #   types: [submitted]
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  build:
    name: Build with ${{ matrix.pgdir }}
    # Previous condition (kept for rollback after temporary debugging period):
    # if: github.event_name == 'workflow_dispatch' || github.event.review.state == 'approved'
    runs-on: self-hosted
    timeout-minutes: 20

    strategy:
      # List of PostgreSQL binary directory names under the configured root.
      # To add more PostgreSQL versions, append entries here, e.g.:
      #   - psql170
      #   - psql160
      matrix:
        pgdir:
          - psql183
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and install pg_strom
        env:
          PSQLBIN_ROOT: ${{ env.PSQLBIN_ROOT }}
        run: |
          PSQLBIN_ROOT=${PSQLBIN_ROOT:-/actions-runner/psqlbin}
          cd src
          PG_CONFIG=${PSQLBIN_ROOT}/${{ matrix.pgdir }}/bin/pg_config make -j$(nproc) install

      - name: Notify approver on failure
        if: failure() && github.event_name == 'pull_request_review' && env.ACT != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const approver = context.payload.review.user.login;
            const prNumber = context.payload.pull_request.number;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `@${approver} the post-approval build check failed for \`${{ matrix.pgdir }}\`.`,
              '',
              `Run: ${runUrl}`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });
